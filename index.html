<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Agency Hosting Tracker</title>
    <style>
        :root { --bg: #000000; --card: #1c1c1e; --text: #ffffff; --accent: #0a84ff; --danger: #ff453a; --success: #32d74b; --warning: #ffd60a; --purple: #bf5af2; --muted: #8e8e93;}
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding-bottom: 120px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Desktop Container Refinement */
        .container { 
            padding: 20px; 
            width: 100%; 
            max-width: 900px; 
            box-sizing: border-box;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { 
            background: var(--card); 
            border-radius: 18px; 
            padding: 24px; 
            margin-bottom: 24px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.5); 
            border: 1px solid #2c2c2e;
        }
        
        #notification-area { width: 100%; max-width: 900px; position: sticky; top: 0; z-index: 1000; }
        .alert-banner { background: var(--danger); color: white; padding: 14px; font-size: 0.9em; font-weight: 700; text-align: center; border-radius: 0 0 12px 12px; }
        
        /* Stats Dashboard */
        .header-stats { display: flex; gap: 16px; margin-bottom: 24px; width: 100%; }
        .stat-block { background: #1c1c1e; border: 1px solid #2c2c2e; padding: 24px; border-radius: 18px; flex: 1; text-align: center; }
        .stat-label { font-size: 0.75em; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .stat-value { font-size: 1.8em; font-weight: 800; color: var(--success); }

        /* View Toggle */
        .view-toggle { display: flex; background: #1c1c1e; border: 1px solid #2c2c2e; border-radius: 12px; padding: 4px; margin-bottom: 24px; width: fit-content; }
        .toggle-btn { border: none; background: transparent; color: var(--muted); padding: 8px 24px; font-size: 0.85em; font-weight: 600; border-radius: 9px; cursor: pointer; transition: 0.2s; }
        .toggle-btn.active { background: #3a3a3c; color: white; }

        /* Form Grid - Fixed for Desktop */
        @media (min-width: 768px) {
            #add-form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; }
            .full-row { grid-column: span 2; }
            .form-header { grid-column: span 2; margin-top: 0; }
            #save-btn { grid-column: span 2; margin-top: 10px; }
            .checkbox-row { grid-column: span 2; justify-content: flex-start !important; gap: 12px; }
        }

        /* Calendar & List Styling */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .cal-cell { background: #2c2c2e; border-radius: 10px; padding: 18px 0; text-align: center; font-size: 1em; }
        .cal-cell.has-event { border-bottom: 4px solid var(--accent); }
        .cal-cell.today { border: 1px solid var(--accent); color: var(--accent); font-weight: bold; }

        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #2c2c2e; }
        .item-info b { font-size: 1.2em; color: #fff; }
        .item-sub { font-size: 0.9em; color: var(--muted); margin-top: 6px; display: flex; align-items: center; gap: 12px; }
        
        .price-box { text-align: right; }
        .price-eur { font-weight: 800; font-size: 1.3em; color: #fff; }
        .price-usd { font-size: 0.85em; color: var(--muted); margin-top: 4px; }

        .badge { background: #2c2c2e; color: var(--accent); padding: 6px 12px; border-radius: 8px; font-size: 0.8em; font-weight: 600; text-decoration: none; }
        .badge-np { color: var(--warning); border: 1px solid var(--warning); background: transparent; }
        .btn-action { background: var(--accent); color: white; border: none; padding: 10px 16px; border-radius: 8px; font-size: 0.8em; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
        .btn-action:active { opacity: 0.7; }

        input, select, button { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #2c2c2e; background: #1c1c1e; color: white; font-size: 16px; margin-bottom: 16px; }
        .checkbox-row { display: flex; justify-content: space-between; align-items: center; background: #1c1c1e; border: 1px solid #2c2c2e; padding: 18px; border-radius: 12px; margin-bottom: 16px; }
        .checkbox-row input { width: 22px; height: 22px; margin: 0; accent-color: var(--accent); }

        /* Centered Bottom Nav */
        .nav { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 400px; 
            background: rgba(28,28,30,0.8); backdrop-filter: blur(20px); 
            display: flex; padding: 12px; border-radius: 24px; border: 1px solid #38383a; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        .nav-item { flex: 1; text-align: center; color: var(--muted); font-size: 0.85em; font-weight: 600; cursor: pointer; padding: 10px; border-radius: 16px; transition: 0.3s; }
        .nav-item.active { color: #fff; background: #3a3a3c; }

        /* Auth UI */
        #auth-screen { position: fixed; inset: 0; background: black; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .key { width: 85px; height: 85px; background: #1c1c1e; border: 1px solid #2c2c2e; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8em; font-weight: 300; cursor: pointer; }
        .key:active { background: #3a3a3c; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 style="font-weight: 800; letter-spacing: -1px; margin-bottom: 8px;">Agency Drive</h1>
        <p style="color:var(--muted); margin-bottom:32px; font-weight: 500;">Please verify your identity</p>
        <div id="pin-dots" style="font-size: 2.2em; letter-spacing: 16px; height: 48px; color: var(--accent);"></div>
        <div class="keypad">
            <div class="key" onclick="press(1)">1</div><div class="key" onclick="press(2)">2</div><div class="key" onclick="press(3)">3</div>
            <div class="key" onclick="press(4)">4</div><div class="key" onclick="press(5)">5</div><div class="key" onclick="press(6)">6</div>
            <div class="key" onclick="press(7)">7</div><div class="key" onclick="press(8)">8</div><div class="key" onclick="press(9)">9</div>
            <div class="key" style="border:none; background:transparent" onclick="clearPin()">Clear</div><div class="key" onclick="press(0)">0</div>
        </div>
    </div>

    <div id="notification-area"></div>

    <div id="view-home" class="container hidden">
        <div class="header-stats">
            <div class="stat-block"><div class="stat-label">30-Day Outlook</div><div id="stat-upcoming" class="stat-value">0€</div></div>
            <div class="stat-block"><div class="stat-label">Projected MRR</div><div id="stat-mrr" class="stat-value">0€</div></div>
        </div>

        <div class="view-toggle">
            <button id="btn-cal" class="toggle-btn active" onclick="setView('cal')">Calendar View</button>
            <button id="btn-list" class="toggle-btn" onclick="setView('list')">Audit List</button>
        </div>
        
        <div id="mode-cal">
            <div class="card">
                <div class="cal-header">
                    <span id="cal-title" style="font-size: 1.2em; font-weight: 700;">Month Year</span>
                    <div style="display:flex; gap:8px;">
                        <button onclick="adjMonth(-1)" style="width:auto; padding:8px 16px; margin:0; background:#2c2c2e;">‹</button> 
                        <button onclick="adjMonth(1)" style="width:auto; padding:8px 16px; margin:0; background:#2c2c2e;">›</button>
                    </div>
                </div>
                <div id="calendar-grid" class="cal-grid"></div>
            </div>
            <div class="card">
                <h2 style="font-size:0.8em; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:20px;">Monthly Renewals</h2>
                <div id="timeline-month"></div>
            </div>
        </div>

        <div id="mode-list" class="hidden">
            <div class="card">
                <h2 style="font-size:0.8em; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:20px;">Master Hosting Audit</h2>
                <div id="timeline-full"></div>
            </div>
        </div>
    </div>

    <div id="view-add" class="container hidden">
        <div class="card">
            <h2 class="form-header">Provision New Hosting</h2>
            <form id="add-form">
                <div><label>Project Name</label><input type="text" id="c-name" placeholder="Client Name" required></div>
                <div><label>Webflow Tier</label><select id="c-plan"><option value="Basic">Basic ($18/$14)</option><option value="CMS" selected>CMS ($29/$23)</option></select></div>
                <div><label>Billing Cycle</label><select id="c-cycle"><option value="monthly">Monthly</option><option value="annual">Annual</option></select></div>
                <div><label>Next Renewal Date</label><input type="date" id="c-date" required></div>
                <div class="checkbox-row"><span>Apply Non-Profit Discount (-50%)</span><input type="checkbox" id="c-np"></div>
                <button type="submit" id="save-btn">Commit to Database</button>
            </form>
        </div>
    </div>

    <div class="nav hidden" id="nav-bar">
        <div class="nav-item active" onclick="tab('home')">Dashboard</div>
        <div class="nav-item" onclick="tab('add')">Provisioning</div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzyWVxoBOVF5vDC3GxILhSSLuGX3a7ku8yTr-ejio9g7yguO144heqwELsk-Sw3fDOJ8A/exec";
        const PIN = "9263";
        let db = [], curMonth = new Date().getMonth(), curYear = new Date().getFullYear(), inputPin = "";

        function press(n) {
            inputPin += n;
            document.getElementById('pin-dots').innerText = "•".repeat(inputPin.length);
            if(inputPin === PIN) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('nav-bar').classList.remove('hidden');
                tab('home'); refresh();
            } else if(inputPin.length >= 4) clearPin();
        }
        function clearPin() { inputPin = ""; document.getElementById('pin-dots').innerText = ""; }

        async function refresh() {
            const r = await fetch(API);
            const j = await r.json();
            db = j.data; render();
        }

        function setView(m) {
            document.getElementById('mode-cal').classList.toggle('hidden', m!=='cal');
            document.getElementById('mode-list').classList.toggle('hidden', m!=='list');
            document.getElementById('btn-cal').classList.toggle('active', m==='cal');
            document.getElementById('btn-list').classList.toggle('active', m==='list');
        }

        function calc(plan, cycle, isNp) {
            let usd = (plan === 'CMS') ? (cycle === 'monthly' ? 29 : 276) : (cycle === 'monthly' ? 18 : 168);
            if(isNp) usd *= 0.5;
            return { usd: usd, eur: usd * 0.92 };
        }

        function render() {
            const tMonth = document.getElementById('timeline-month'), tFull = document.getElementById('timeline-full'), grid = document.getElementById('calendar-grid'), notif = document.getElementById('notification-area');
            tMonth.innerHTML = ""; tFull.innerHTML = ""; grid.innerHTML = ""; notif.innerHTML = "";
            let up30 = 0, mrrTotal = 0;

            document.getElementById('cal-title').innerText = new Date(curYear, curMonth).toLocaleDateString(undefined, {month:'long', year:'numeric'});

            const sortedDb = [...db].sort((a,b) => new Date(a.NextRenewal) - new Date(b.NextRenewal));

            sortedDb.forEach(c => {
                const d = new Date(c.NextRenewal), p = calc(c.PlanType, c.BillingCycle, c.IsNonProfit);
                const diff = (d - new Date()) / 86400000;
                
                if(diff > 0 && diff <= 30) up30 += p.eur;
                mrrTotal += (c.BillingCycle === 'monthly' ? p.eur : p.eur / 12);

                if(c.IsNonProfit && diff > 0 && diff <= 30) {
                    notif.innerHTML += `<div class="alert-banner">🚨 Non-Profit Renewal for ${c.ClientName} in ${Math.round(diff)} days</div>`;
                }

                const itemHtml = `
                    <div class="list-item">
                        <div class="item-info">
                            <b>${c.ClientName}</b>
                            <div class="item-sub">
                                <span>🗓 ${d.toLocaleDateString(undefined, {day:'numeric', month:'short', year:'2-digit'})}</span>
                                <span>• ${c.PlanType}</span>
                                ${c.IsNonProfit ? '<span class="badge badge-np">Non-Profit</span>' : ''}
                            </div>
                            <div style="display:flex; gap:12px; margin-top:12px;">
                                ${c.InvoiceURL ? `<a href="${c.InvoiceURL}" target="_blank" class="badge">View Invoice</a>` : `<button class="btn-action" onclick="upFile('${c.ID}', 'upload_invoice', this)">Upload Invoice</button>`}
                                ${c.IsNonProfit ? (c.DiscountDocURL ? `<a href="${c.DiscountDocURL}" target="_blank" class="badge">View Proof</a>` : `<button class="btn-action" onclick="upFile('${c.ID}', 'upload_discount_doc', this)" style="background:var(--warning); color:#000;">Upload Proof</button>`) : ''}
                            </div>
                        </div>
                        <div class="price-box">
                            <div class="price-eur">${p.eur.toFixed(2)}€</div>
                            <div class="price-usd">$${p.usd}</div>
                        </div>
                    </div>`;

                tFull.innerHTML += itemHtml;
                if(d.getMonth() === curMonth && d.getFullYear() === curYear) tMonth.innerHTML += itemHtml;
            });

            document.getElementById('stat-upcoming').innerText = up30.toFixed(0) + "€";
            document.getElementById('stat-mrr').innerText = mrrTotal.toFixed(0) + "€";

            let firstDay = new Date(curYear, curMonth, 1).getDay();
            for(let i=0; i<firstDay; i++) grid.innerHTML += `<div></div>`;
            for(let i=1; i<=new Date(curYear, curMonth+1, 0).getDate(); i++) {
                let has = db.some(c => {
                    let rd = new Date(c.NextRenewal);
                    return rd.getDate() === i && rd.getMonth() === curMonth && rd.getFullYear() === curYear;
                });
                grid.innerHTML += `<div class="cal-cell ${has?'has-event':''}">${i}</div>`;
            }
        }

        async function upFile(id, action, btn) {
            const input = document.createElement('input');
            input.type = 'file'; input.accept = 'application/pdf';
            input.onchange = async e => {
                const file = e.target.files[0]; if(!file) return;
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    const originalText = btn.innerText;
                    btn.innerText = "⏳...";
                    const payload = { action: action, data: { filename: file.name, mimeType: file.type, base64: reader.result.split(',')[1], rowId: id } };
                    await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
                    btn.innerText = "✅ Done";
                    setTimeout(refresh, 1000);
                };
            };
            input.click();
        }

        document.getElementById('add-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('save-btn');
            btn.innerText = "Provisioning...";
            const p = { action: "add_subscription", data: { 
                clientName: document.getElementById('c-name').value, 
                planType: document.getElementById('c-plan').value,
                billingCycle: document.getElementById('c-cycle').value,
                isNonProfit: document.getElementById('c-np').checked,
                nextRenewal: document.getElementById('c-date').value,
                startDate: new Date().toISOString().split('T')[0], priceUSD: 0, priceEUR: 0
            }};
            await fetch(API, { method: 'POST', body: JSON.stringify(p) });
            btn.innerText = "Commit to Database";
            document.getElementById('add-form').reset();
            tab('home'); refresh();
        };

        function tab(t) {
            document.getElementById('view-home').classList.toggle('hidden', t!=='home');
            document.getElementById('view-add').classList.toggle('hidden', t!=='add');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.toggle('active', i.innerText.toLowerCase().includes(t.substring(0,4))));
        }
        function adjMonth(v) { curMonth += v; if(curMonth>11){curMonth=0;curYear++} if(curMonth<0){curMonth=11;curYear--} render(); }
    </script>
</body>
</html>
