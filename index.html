<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Agency Hosting Tracker</title>
    <style>
        :root { 
            --bg: #000000; 
            --card: #1c1c1e; 
            --text: #ffffff; 
            --accent: #0a84ff; 
            --danger: #ff453a; 
            --success: #32d74b; 
            --warning: #ffd60a; 
            --purple: #bf5af2; 
            --muted: #8e8e93;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding-bottom: 100px; 
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centers the app on wide screens */
        }

        .container { 
            padding: 20px; 
            width: 100%; 
            max-width: 900px; /* Limits width to keep it elegant on desktop */
            box-sizing: border-box;
        }

        .card { 
            background: var(--card); 
            border-radius: 16px; 
            padding: 24px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); 
        }
        
        #notification-area { 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            width: 100%; 
            max-width: 900px; 
        }

        .alert-banner { 
            background: var(--danger); 
            color: white; 
            padding: 14px; 
            font-size: 0.9em; 
            font-weight: bold; 
            text-align: center; 
            border-radius: 0 0 12px 12px;
        }
        
        .header-stats { 
            display: flex; 
            justify-content: space-between; 
            gap: 15px; 
            margin-bottom: 20px; 
            width: 100%;
        }

        .stat-block { 
            background: #2c2c2e; 
            padding: 20px; 
            border-radius: 14px; 
            flex: 1; 
            text-align: center; 
        }

        .stat-label { font-size: 0.75em; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 1.4em; font-weight: bold; color: var(--success); margin-top: 5px; }

        .view-toggle { 
            display: flex; 
            background: #2c2c2e; 
            border-radius: 12px; 
            padding: 5px; 
            margin-bottom: 20px; 
            width: fit-content;
            align-self: flex-start;
        }

        .toggle-btn { 
            border: none; 
            background: transparent; 
            color: var(--muted); 
            padding: 10px 20px; 
            font-size: 0.9em; 
            font-weight: 600; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.2s;
        }

        .toggle-btn.active { background: #48484a; color: white; }

        /* Desktop Form Grid */
        @media (min-width: 768px) {
            #add-form {
                display: grid;
                grid-template-columns: 1fr 1fr; /* Two columns for inputs */
                gap: 10px 25px;
            }
            #add-form h2, #add-form .full-width, #add-form button {
                grid-column: span 2;
            }
            .checkbox-row { grid-column: span 2; justify-content: flex-start !important; gap: 15px; }
        }

        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: 600; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .cal-cell { background: #2c2c2e; border-radius: 10px; padding: 15px 0; text-align: center; font-size: 1em; }
        .cal-cell.has-event { border-bottom: 4px solid var(--accent); }
        .cal-cell.today { border: 1px solid var(--accent); color: var(--accent); }

        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #38383a; }
        .item-sub { font-size: 0.9em; color: var(--muted); margin-top: 6px; display: flex; align-items: center; gap: 10px; }
        
        .price-box { text-align: right; min-width: 100px; }
        .price-eur { font-weight: bold; font-size: 1.2em; }

        .badge { background: #38383a; color: var(--accent); padding: 5px 10px; border-radius: 6px; font-size: 0.8em; font-weight: bold; text-decoration: none; display: inline-block; }
        .badge-np { color: var(--warning); border: 1px solid var(--warning); background: transparent; }
        .btn-action { background: var(--accent); color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 0.8em; font-weight: bold; cursor: pointer; }

        input, select, button { width: 100%; padding: 16px; border-radius: 12px; border: none; background: #2c2c2e; color: white; font-size: 16px; margin-bottom: 15px; }
        .checkbox-row { display: flex; justify-content: space-between; align-items: center; background: #2c2c2e; padding: 18px; border-radius: 12px; margin-bottom: 15px; }
        .checkbox-row input { width: auto; margin: 0; }

        .nav { 
            position: fixed; 
            bottom: 0; 
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 900px;
            background: rgba(28,28,30,0.98); 
            backdrop-filter: blur(20px); 
            display: flex; 
            padding: 15px 0 35px; 
            border-top: 1px solid #38383a; 
            z-index: 100;
        }

        .nav-item { flex: 1; text-align: center; color: var(--muted); font-size: 0.85em; font-weight: 600; cursor: pointer; }
        .nav-item.active { color: var(--accent); }

        #auth-screen { position: fixed; inset: 0; background: black; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .key { width: 80px; height: 80px; background: #1c1c1e; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.6em; cursor: pointer; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h2 style="margin-bottom:0;">Agency Secure Access</h2>
        <p style="color:var(--muted); margin-bottom:20px;">Enter Agency PIN</p>
        <div id="pin-dots" style="font-size: 2em; letter-spacing: 12px; height: 40px;"></div>
        <div class="keypad">
            <div class="key" onclick="press(1)">1</div><div class="key" onclick="press(2)">2</div><div class="key" onclick="press(3)">3</div>
            <div class="key" onclick="press(4)">4</div><div class="key" onclick="press(5)">5</div><div class="key" onclick="press(6)">6</div>
            <div class="key" onclick="press(7)">7</div><div class="key" onclick="press(8)">8</div><div class="key" onclick="press(9)">9</div>
            <div class="key" style="background:transparent" onclick="clearPin()">C</div><div class="key" onclick="press(0)">0</div>
        </div>
    </div>

    <div id="notification-area"></div>

    <div id="view-home" class="container hidden">
        <div class="header-stats">
            <div class="stat-block"><div class="stat-label">Next 30 Days</div><div id="stat-upcoming" class="stat-value">0€</div></div>
            <div class="stat-block"><div class="stat-label">Monthly MRR</div><div id="stat-mrr" class="stat-value">0€</div></div>
        </div>

        <div class="view-toggle">
            <button id="btn-cal" class="toggle-btn active" onclick="setView('cal')">Calendar</button>
            <button id="btn-list" class="toggle-btn" onclick="setView('list')">Master List</button>
        </div>
        
        <div id="mode-cal">
            <div class="card">
                <div class="cal-header">
                    <span id="cal-title">Month Year</span>
                    <div><button onclick="adjMonth(-1)" style="width:auto; padding:5px 15px; margin:0;">‹</button> <button onclick="adjMonth(1)" style="width:auto; padding:5px 15px; margin:0;">›</button></div>
                </div>
                <div id="calendar-grid" class="cal-grid"></div>
            </div>
            <div class="card">
                <h2 style="font-size:0.9em; color:var(--muted); text-transform:uppercase;">Month Renewals</h2>
                <div id="timeline-month"></div>
            </div>
        </div>

        <div id="mode-list" class="hidden">
            <div class="card">
                <h2 style="font-size:0.9em; color:var(--muted); text-transform:uppercase;">Chronological Renewals</h2>
                <div id="timeline-full"></div>
            </div>
        </div>
    </div>

    <div id="view-add" class="container hidden">
        <div class="card">
            <h2>Add New Hosting</h2>
            <form id="add-form">
                <label>Client Name</label><input type="text" id="c-name" placeholder="Client Name" required>
                <label>Webflow Plan</label><select id="c-plan"><option value="Basic">Basic ($18/$14)</option><option value="CMS" selected>CMS ($29/$23)</option></select>
                <label>Billing Cycle</label><select id="c-cycle"><option value="monthly">Monthly</option><option value="annual">Annual</option></select>
                <div class="checkbox-row"><span>Non-Profit (-50%)</span><input type="checkbox" id="c-np"></div>
                <label>Renewal Date</label><input type="date" id="c-date" required>
                <button type="submit" id="save-btn">Save to Agency Drive</button>
            </form>
        </div>
    </div>

    <div class="nav hidden" id="nav-bar">
        <div class="nav-item active" onclick="tab('home')">📅 Dashboard</div>
        <div class="nav-item" onclick="tab('add')">➕ Add Client</div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzyWVxoBOVF5vDC3GxILhSSLuGX3a7ku8yTr-ejio9g7yguO144heqwELsk-Sw3fDOJ8A/exec";
        const PIN = "9263";
        let db = [], curMonth = new Date().getMonth(), curYear = new Date().getFullYear(), inputPin = "";

        // --- AUTH ---
        function press(n) {
            inputPin += n;
            document.getElementById('pin-dots').innerText = "•".repeat(inputPin.length);
            if(inputPin === PIN) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('nav-bar').classList.remove('hidden');
                tab('home');
                refresh();
            } else if(inputPin.length >= 4) clearPin();
        }
        function clearPin() { inputPin = ""; document.getElementById('pin-dots').innerText = ""; }

        // --- CORE LOGIC ---
        async function refresh() {
            const r = await fetch(API);
            const j = await r.json();
            db = j.data;
            render();
        }

        function setView(m) {
            document.getElementById('mode-cal').classList.toggle('hidden', m!=='cal');
            document.getElementById('mode-list').classList.toggle('hidden', m!=='list');
            document.getElementById('btn-cal').classList.toggle('active', m==='cal');
            document.getElementById('btn-list').classList.toggle('active', m==='list');
        }

        function calc(plan, cycle, isNp) {
            let usd = (plan === 'CMS') ? (cycle === 'monthly' ? 29 : 276) : (cycle === 'monthly' ? 18 : 168);
            if(isNp) usd *= 0.5;
            return { usd: usd, eur: usd * 0.92 };
        }

        function render() {
            const tMonth = document.getElementById('timeline-month'), tFull = document.getElementById('timeline-full'), grid = document.getElementById('calendar-grid'), notif = document.getElementById('notification-area');
            tMonth.innerHTML = ""; tFull.innerHTML = ""; grid.innerHTML = ""; notif.innerHTML = "";
            let up30 = 0, mrrTotal = 0;

            document.getElementById('cal-title').innerText = new Date(curYear, curMonth).toLocaleDateString(undefined, {month:'long', year:'numeric'});

            // Sort entire DB by Date
            const sortedDb = [...db].sort((a,b) => new Date(a.NextRenewal) - new Date(b.NextRenewal));

            sortedDb.forEach(c => {
                const d = new Date(c.NextRenewal), p = calc(c.PlanType, c.BillingCycle, c.IsNonProfit);
                const diff = (d - new Date()) / 86400000;
                
                if(diff > 0 && diff <= 30) up30 += p.eur;
                mrrTotal += (c.BillingCycle === 'monthly' ? p.eur : p.eur / 12);

                if(c.IsNonProfit && diff > 0 && diff <= 30) {
                    notif.innerHTML += `<div class="alert-banner">ACTION: Renew Non-Profit Discount for ${c.ClientName} (${Math.round(diff)}d left)</div>`;
                }

                const itemHtml = `
                    <div class="list-item">
                        <div class="item-info">
                            <b>${c.ClientName}</b>
                            <div class="item-sub">
                                <span>🗓 ${d.toLocaleDateString(undefined, {day:'numeric', month:'short', year:'2-digit'})}</span>
                                <span>• ${c.PlanType}</span>
                                ${c.IsNonProfit ? '<span class="badge badge-np">Non-Profit</span>' : ''}
                            </div>
                            <div style="display:flex; gap:8px;">
                                ${c.InvoiceURL ? `<a href="${c.InvoiceURL}" target="_blank" class="badge">📄 Invoice</a>` : `<button class="btn-action" onclick="upFile('${c.ID}', 'upload_invoice', this)">⬆️ Invoice</button>`}
                                ${c.IsNonProfit ? (c.DiscountDocURL ? `<a href="${c.DiscountDocURL}" target="_blank" class="badge">📄 Proof</a>` : `<button class="btn-action" onclick="upFile('${c.ID}', 'upload_discount_doc', this)">⬆️ Proof</button>`) : ''}
                            </div>
                        </div>
                        <div class="price-box">
                            <div class="price-eur">${p.eur.toFixed(2)}€</div>
                            <div class="price-usd">$${p.usd}</div>
                        </div>
                    </div>`;

                // Add to Full List
                tFull.innerHTML += itemHtml;

                // Add to Month List if applicable
                if(d.getMonth() === curMonth && d.getFullYear() === curYear) {
                    tMonth.innerHTML += itemHtml;
                }
            });

            document.getElementById('stat-upcoming').innerText = up30.toFixed(0) + "€";
            document.getElementById('stat-mrr').innerText = mrrTotal.toFixed(0) + "€";

            let firstDay = new Date(curYear, curMonth, 1).getDay();
            for(let i=0; i<firstDay; i++) grid.innerHTML += `<div></div>`;
            for(let i=1; i<=new Date(curYear, curMonth+1, 0).getDate(); i++) {
                let has = db.some(c => {
                    let rd = new Date(c.NextRenewal);
                    return rd.getDate() === i && rd.getMonth() === curMonth && rd.getFullYear() === curYear;
                });
                grid.innerHTML += `<div class="cal-cell ${has?'has-event':''}">${i}</div>`;
            }
        }

        async function upFile(id, action, btn) {
            const input = document.createElement('input');
            input.type = 'file'; input.accept = 'application/pdf';
            input.onchange = async e => {
                const file = e.target.files[0]; if(!file) return;
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    const originalText = btn.innerText;
                    btn.innerText = "⏳...";
                    const payload = { action: action, data: { filename: file.name, mimeType: file.type, base64: reader.result.split(',')[1], rowId: id } };
                    await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
                    btn.innerText = "✅ Done";
                    setTimeout(refresh, 1000);
                };
            };
            input.click();
        }

        document.getElementById('add-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('save-btn');
            btn.innerText = "Saving to Sheets...";
            const p = { action: "add_subscription", data: { 
                clientName: document.getElementById('c-name').value, 
                planType: document.getElementById('c-plan').value,
                billingCycle: document.getElementById('c-cycle').value,
                isNonProfit: document.getElementById('c-np').checked,
                nextRenewal: document.getElementById('c-date').value,
                startDate: new Date().toISOString().split('T')[0], priceUSD: 0, priceEUR: 0
            }};
            await fetch(API, { method: 'POST', body: JSON.stringify(p) });
            btn.innerText = "Save to Agency Drive";
            document.getElementById('add-form').reset();
            tab('home');
            refresh();
        };

        function tab(t) {
            document.getElementById('view-home').classList.toggle('hidden', t!=='home');
            document.getElementById('view-add').classList.toggle('hidden', t!=='add');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.toggle('active', i.innerText.toLowerCase().includes(t)));
        }
        function adjMonth(v) { curMonth += v; if(curMonth>11){curMonth=0;curYear++} if(curMonth<0){curMonth=11;curYear--} render(); }
    </script>
</body>
</html>
